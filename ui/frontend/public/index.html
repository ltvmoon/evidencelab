<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#5B8FA8" />
    <meta
      name="description"
      content="Evidence Lab - Semantic search for UN evaluation reports"
    />
    <!-- Open Graph / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Evidence Lab" />
    <meta property="og:description" content="Free open-source AI-powered document knowledge retrieval system" />
    <meta property="og:image" content="https://evidencelab.ai/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="627" />
    <meta property="og:url" content="https://evidencelab.ai" />
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <title>Evidence Lab</title>
    <!-- Google Analytics (optional, enabled via REACT_APP_GA_MEASUREMENT_ID) -->
    <!-- GA only loads after user grants cookie consent (GDPR) -->
    <!-- CSP: SHA-256 of this script block is allowlisted in security_headers.py.
         If you modify this script, recompute the hash:
         python3 -c "import hashlib,base64,sys; s=sys.stdin.read(); print('sha256-'+base64.b64encode(hashlib.sha256(s.encode()).digest()).decode())"
         Then update _GA_SCRIPT_HASH in ui/backend/auth/security_headers.py -->
    <script>
      (function() {
        var gaId = '%REACT_APP_GA_MEASUREMENT_ID%';
        if (gaId && gaId.startsWith('G-')) {
          window.__GA_ID__ = gaId;
          if (localStorage.getItem('ga-consent') !== 'granted') return;
          var s = document.createElement('script');
          s.async = true;
          s.crossOrigin = 'anonymous';
          s.src = 'https://www.googletagmanager.com/gtag/js?id=' + gaId;
          document.head.appendChild(s);
          window.dataLayer = window.dataLayer || [];
          function gtag(){dataLayer.push(arguments);}
          window.gtag = gtag;
          gtag('js', new Date());
          gtag('config', gaId);
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <!-- Static links visible to crawlers that do not execute JavaScript -->
    <div id="static-footer" style="text-align:center;padding:1rem;font-size:0.85rem;">
      <a href="/privacy">Privacy Policy</a> |
      <a href="/terms">Terms of Service</a>
    </div>
  </body>
</html>
