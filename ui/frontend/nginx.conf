server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Allow larger request bodies for AI summary payloads
    client_max_body_size 25m;

    # -------------------------------------------------------------------------
    # Security headers
    # Deployment note: HSTS and strict CSP are enforced by the upstream
    # Caddy reverse proxy which terminates TLS.  These headers add a
    # defence-in-depth layer at the nginx level for all responses.
    # -------------------------------------------------------------------------
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # XSS-Protection: "0" is the modern recommendation — disables the legacy
    # browser XSS filter which itself introduced XSS vectors in older browsers.
    add_header X-XSS-Protection "0" always;
    # Restrict browser features not used by the application.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # MCP server (Model Context Protocol) and A2A agent — long-lived streaming connections
    # Use a variable + resolver so nginx starts even if the mcp service is not running
    resolver 127.0.0.11 valid=10s;
    set $mcp_upstream http://mcp:8001;
    location ^~ /mcp {
        proxy_pass $mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # A2A agent (Agent-to-Agent protocol) — SSE streaming, no buffering
    location ^~ /a2a {
        proxy_pass $mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_buffering off;
    }

    # A2A agent card — served at both filenames (spec updated to agent-card.json)
    location = /.well-known/agent.json {
        proxy_pass $mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /.well-known/agent-card.json {
        proxy_pass $mcp_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy API calls to backend (internal Docker network only)
    # Authentication is handled by session cookies (UI) or X-API-Key header (external).
    # Use ^~ to give this prefix location priority over regex locations
    location ^~ /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # Base-path API routing (e.g., /evidencelab/api/*)
    location ^~ /evidencelab/api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_buffering off;
    }

    # Cache static assets (excluding API routes)
    location ~* ^/(?!api/).*\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # React Router: serve index.html for all routes.
    # Only check $uri (exact file), not $uri/ (directory) — a real directory
    # like /docs/ would trigger a 403 instead of falling through to the SPA.
    location /evidencelab/ {
        try_files $uri /index.html;
    }
    location / {
        try_files $uri /index.html;
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
